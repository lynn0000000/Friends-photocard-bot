<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有點東西 管理後台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .box { background: #fff; padding: 32px 24px; border-radius: 12px; width: 100%; max-width: 360px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
        h1 { font-size: 18px; margin-bottom: 24px; text-align: center; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #adf0e0; color: #1a6b5a; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; }
        .error { color: red; font-size: 13px; margin-bottom: 12px; text-align: center; }
</style>
</head>
<body>
    <div class="box">
        <h1>🎴 有點東西 管理後台</h1>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="帳號" required>
            <input type="password" name="password" placeholder="密碼" required>
            <button type="submit">登入</button>
        </form>
    </div>
</body>
</html>
